<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>抖音直播</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #fff;
    user-select: none; }

  #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

  /* === Видео (фон) === */
  #video {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #ff4d6d, #c9184a, #590d22);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
    display: flex; align-items: center; justify-content: center;
    font-size: 80px; opacity: 0.9;
    overflow: hidden;
  }
  #video video {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  #video.off video { display: none; }
  #video.off { background: #000 !important; animation: none; }
  #video.off::after { content: "📷 摄像头已关闭"; font-size: 20px; opacity: 0.7; position: absolute; z-index: 2; }
  #video:not(.off)::after { display: none; }
  #video > .streamer-emoji { font-size: 120px; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5)); z-index: 1; }
  #video.off > .streamer-emoji { display: block; }
  #video:not(.off) > .streamer-emoji { display: none; }
  @keyframes bgMove { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  /* === Верхняя панель === */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; padding: 40px 12px 10px;
    display: flex; align-items: center; gap: 8px; z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    flex-wrap: nowrap;
  }
  .streamer { display: flex; align-items: center; background: rgba(0,0,0,0.4);
    border-radius: 30px; padding: 4px 10px 4px 4px; gap: 6px; flex-shrink: 0; }
  .streamer img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #ff4d6d; }
  .streamer .name { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .streamer .live-tag { background: #ff2c55; color: #fff; font-size: 10px; padding: 2px 6px;
    border-radius: 4px; margin-left: 4px; font-weight: 700; }
  .viewers { background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 30px; font-size: 12px;
    flex-shrink: 0; white-space: nowrap; min-width: 80px; }
  .viewers span { display: inline-block; text-align: center; min-width: 45px; white-space: nowrap; }
  .top-actions { margin-left: auto; display: flex; gap: 6px; flex-shrink: 0; }
  .top-actions button { background: rgba(0,0,0,0.4); border: none; color: #fff;
    padding: 6px 10px; border-radius: 30px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .follow-btn { background: #ff2c55 !important; font-weight: 600; }

  /* === Бегущая строка === */
  .gift-ticker {
    position: absolute; top: 90px; left: 8px; right: 8px;
    background: linear-gradient(90deg, rgba(255,180,0,0.85), rgba(255,80,0,0.85));
    color: #fff; font-size: 11px; padding: 6px 10px; border-radius: 20px;
    z-index: 9; overflow: hidden; white-space: nowrap; height: 24px;
    display: flex; align-items: center;
  }
  .gift-ticker .text { display: inline-block; padding-left: 100%; animation: scrollLeft 18s linear infinite; }
  @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-100%); } }

  .top-donate {
    position: absolute; top: 125px; left: 8px;
    background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 12px;
    font-size: 11px; z-index: 9; white-space: nowrap;
  }

  /* === Чат === */
  #chat {
    position: absolute; left: 8px; right: 60px; bottom: 75px;
    max-height: 35vh; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
    z-index: 10; pointer-events: none;
  }
  .msg {
    background: rgba(0,0,0,0.4); border-radius: 16px; padding: 6px 10px;
    margin-top: 6px; font-size: 13px; max-width: 90%;
    animation: msgIn 0.4s ease; word-break: break-word;
    display: flex; align-items: flex-start; gap: 6px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .msg.fade-out { opacity: 0; transform: translateX(20px); pointer-events: none; }
  .msg img { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; }
  .msg .name { color: #ffd700; font-weight: 600; margin-right: 4px; }
  .msg .name.host { color: #ff4d6d; }
  .msg.host { background: rgba(255,44,85,0.35); border: 1px solid #ff4d6d; align-self: flex-end; }
  .msg .heart { color: #ff2c55; margin-left: 4px; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* === Поток сердечек === */
  #hearts {
    position: absolute; right: 0; bottom: 0;
    width: 220px; height: 85vh; /* высота почти весь экран, чтобы не обрезались */
    pointer-events: none; z-index: 8; overflow: hidden;
  }
  .heart-fly {
    position: absolute; bottom: 15px; right: 20px; /* старт из правого нижнего угла */
    font-size: 26px;
    animation: heartFly 3.5s ease-out forwards;
  }
  @keyframes heartFly {
    0% { transform: translate(0,0) scale(0.5); opacity: 0; }
    10% { opacity: 1; transform: translate(0,-20px) scale(1); }
    100% { transform: translate(var(--x, -40px), -85vh) scale(1.2); opacity: 0; }
  }

  /* === Нижняя панель === */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 8px));
    display: flex; gap: 6px; align-items: center; z-index: 20;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  }
  #msgInput {
    flex: 1; background: rgba(255,255,255,0.15); border: none; color: #fff;
    padding: 10px 14px; border-radius: 30px; font-size: 13px; outline: none;
  }
  #msgInput::placeholder { color: rgba(255,255,255,0.6); }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn.like { background: rgba(255,44,85,0.3); }

  /* === Кнопки справа === */
  .corner-btns { position: absolute; top: 50%; right: 6px; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 11; }
  .corner-btns button {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(0,0,0,0.4); color: #fff; border: none; font-size: 16px; cursor: pointer;
  }

  .toast {
    position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 20px;
    font-size: 13px; z-index: 100; animation: toastIn 0.3s, toastOut 0.3s 1.7s forwards;
  }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes toastOut { to { opacity: 0; } }
</style>
</head>
<body>

<div id="app">
  <div id="video">
    <video id="videoElement" autoplay playsinline muted></video>
    <div class="streamer-emoji">💃</div>
  </div>

  <div class="top-bar">
    <div class="streamer">
      <img src="https://i.pravatar.cc/64?u=streamer" alt="">
      <span class="name">小美主播</span>
      <span class="live-tag">LIVE</span>
    </div>
    <div class="viewers">👁 <span id="viewerCount">0</span></div>
    <div class="top-actions">
      <button id="shareBtn">分享</button>
      <button class="follow-btn" id="followBtn">+ 关注</button>
      <button id="giftBtn">🎁</button>
    </div>
  </div>

  <div class="gift-ticker"><span class="text" id="giftText">🎁 用户123 送出 99 朵玫瑰！ 主播好棒！ 欢迎新观众！</span></div>
  <div class="top-donate">🏆 榜一: 大佬666 · 9999币</div>
  <div id="chat"></div>
  <div id="hearts"></div>

  <div class="corner-btns">
    <button id="camBtn" title="摄像头开关">📷</button>
    <button id="switchCamBtn" title="切换前后摄像头">🔄</button>
    <button id="muteBtn" title="静音切换">🔊</button>
    <button id="fsBtn" title="全屏">⛶</button>
  </div>

  <div class="bottom-bar">
    <input id="msgInput" type="text" placeholder="说点什么..." maxlength="100">
    <button class="icon-btn" id="sendBtn">➤</button>
    <button class="icon-btn like" id="likeBtn">❤️</button>
  </div>
</div>

<script src="comments.js"></script>

<script>
/* ============================================================
   КОНФИГУРАЦИЯ
============================================================ */
const CONFIG = {
  USER_COUNT: 112,
  MIN_USER_INTERVAL: 30000,
  LIKE_PROBABILITY: 0.20,
  // Новые фазы: сразу 5 зрителей, рост до 35 за 8 минут
  PHASE1_TARGET: 5,
  PHASE1_DURATION: 10,       // 10 секунд на появление первых 5 зрителей
  PHASE2_DURATION: 8 * 60,  // рост до 35 за 8 минут
  PHASE2_TARGET: 35,
  PHASE3_TARGET: 8000,
  PHASE3_DURATION: 25 * 60,
  MIN_VIEWERS_CMD2: 58,
  MIN_MSG_PER_MIN_CMD2: 35
};

const state = {
  startTime: Date.now(),
  viewers: 0,
  targetViewers: 0,
  growthMultiplier: 1.0,
  freqMultiplier: 1.0,
  msgInLastMinute: [],
  likesInLastSec: 0,
  cameraOn: false,
  cameraFacing: 'user',
  audioMuted: false,
  stream: null
};

/* ============================================================
   ПОЛЬЗОВАТЕЛИ
============================================================ */
const cnNames = ["小明","花花","可爱多","大宝","糖糖","阿强","萌萌","奶茶","小仙女","风的孩子",
  "夜空","月亮","星辰","橙子","柚子","西瓜","苹果","樱桃","蜜桃","柠檬",
  "云朵","海风","雨滴","雪花","彩虹","流星","太阳","月光","清风","明月"];
const enNames = ["Lily","Tom","Jack","Anna","Mike","Sophie","Leo","Emma","Max","Zoe",
  "Rose","Jay","Sky","Luna","Nova","Echo","Sage","Rain","Storm","Snow"];

const users = [];
for (let i = 0; i < CONFIG.USER_COUNT; i++) {
  const useCN = Math.random() < 0.7;
  const base = useCN ? cnNames[i % cnNames.length] : enNames[i % enNames.length];
  users.push({
    id: i,
    name: base + (Math.random() < 0.5 ? Math.floor(Math.random()*999) : ""),
    avatar: `https://i.pravatar.cc/40?u=user${i}`,
    lastMessageTime: 0
  });
}

const fallbackComments = [
  "主播好棒！❤️","太可爱了😍","加油加油！","Love it! 👍","666666",
  "哈哈哈😂","主播唱歌真好听","打卡了","太美了","送花花🌹"
];
const COMMENTS = (typeof commentsList !== 'undefined' && commentsList.length) ? commentsList : fallbackComments;

/* ============================================================
   КАМЕРА
============================================================ */
const videoElement = document.getElementById('videoElement');
const videoContainer = document.getElementById('video');

async function startCamera(facingMode = 'user') {
  stopCamera();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: facingMode } },
      audio: true
    });
    applyStream(stream, facingMode);
  } catch (e) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode },
        audio: true
      });
      applyStream(stream, facingMode);
    } catch (e2) {
      handleCameraError(e2);
    }
  }
}

function applyStream(stream, facingMode) {
  state.stream = stream;
  videoElement.srcObject = stream;
  videoElement.muted = state.audioMuted;
  state.cameraOn = true;
  state.cameraFacing = facingMode;
  videoContainer.classList.remove('off');
  showToast(facingMode === 'user' ? '📷 前置摄像头已开启' : '📷 后置摄像头已开启');
  updateMuteButton();
}

function handleCameraError(error) {
  state.cameraOn = false;
  videoContainer.classList.add('off');
  if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
    showToast('❌ Доступ к камере запрещён. Разрешите в настройках браузера и попробуйте снова.');
  } else if (error.name === 'NotFoundError') {
    showToast('❌ Камера не найдена.');
  } else {
    showToast('❌ Ошибка камеры: ' + (error.message || 'неизвестная ошибка'));
  }
  console.error('Camera error:', error);
}

function stopCamera() {
  if (state.stream) {
    state.stream.getTracks().forEach(track => track.stop());
    state.stream = null;
  }
  videoElement.srcObject = null;
  state.cameraOn = false;
  videoContainer.classList.add('off');
  updateMuteButton();
}

function toggleCamera() {
  if (state.cameraOn) {
    stopCamera();
    showToast('📷 摄像头已关闭');
  } else {
    startCamera(state.cameraFacing);
  }
}

function switchCamera() {
  if (!state.cameraOn) {
    showToast('⚠️ 请先开启摄像头');
    return;
  }
  const newFacing = state.cameraFacing === 'user' ? 'environment' : 'user';
  startCamera(newFacing);
}

/* ============================================================
   MUTE
============================================================ */
const muteBtn = document.getElementById('muteBtn');
function toggleMute() {
  state.audioMuted = !state.audioMuted;
  if (videoElement) videoElement.muted = state.audioMuted;
  updateMuteButton();
}

function updateMuteButton() {
  if (!state.cameraOn) {
    muteBtn.textContent = '🔇';
    return;
  }
  muteBtn.textContent = state.audioMuted ? '🔇' : '🔊';
}
muteBtn.onclick = toggleMute;

/* ============================================================
   ЗРИТЕЛИ (изменённая динамика)
============================================================ */
function updateViewers() {
  const elapsed = (Date.now() - state.startTime) / 1000;
  let target;

  if (elapsed < CONFIG.PHASE1_DURATION) {
    // первые секунды: плавно до 5 зрителей
    target = (elapsed / CONFIG.PHASE1_DURATION) * CONFIG.PHASE1_TARGET;
  } else if (elapsed < CONFIG.PHASE1_DURATION + CONFIG.PHASE2_DURATION) {
    const t = (elapsed - CONFIG.PHASE1_DURATION) / CONFIG.PHASE2_DURATION;
    target = CONFIG.PHASE1_TARGET + t * (CONFIG.PHASE2_TARGET - CONFIG.PHASE1_TARGET);
  } else {
    const t = Math.min(1, (elapsed - CONFIG.PHASE1_DURATION - CONFIG.PHASE2_DURATION) / CONFIG.PHASE3_DURATION);
    const k = 6;
    const logistic = 1 / (1 + Math.exp(-k * (t - 0.5)));
    target = CONFIG.PHASE2_TARGET + (CONFIG.PHASE3_TARGET - CONFIG.PHASE2_TARGET) * logistic;
  }

  target *= state.growthMultiplier;
  state.targetViewers = Math.max(0, target);

  const diff = state.targetViewers - state.viewers;
  state.viewers += diff * 0.05;
  if (Math.abs(diff) < 0.5) state.viewers = state.targetViewers;

  document.getElementById('viewerCount').textContent = formatNumber(Math.floor(state.viewers));
}

function formatNumber(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toString();
}

/* ============================================================
   ЧАТ (сообщения с 5 зрителей и очень много)
============================================================ */
const chatEl = document.getElementById('chat');
const randomEmojis = ["😂","❤️","🔥","👍","🌹","😍","✨","🎉","💖","👏"];

function pickRandomComment() {
  let text = COMMENTS[Math.floor(Math.random() * COMMENTS.length)];
  if (Math.random() < 0.3) text = randomEmojis[Math.floor(Math.random()*randomEmojis.length)] + " " + text;
  if (Math.random() < 0.2) text = text + " " + randomEmojis[Math.floor(Math.random()*randomEmojis.length)];
  return text;
}

function addMessage({name, avatar, text, isHost = false, liked = false}) {
  const div = document.createElement('div');
  div.className = 'msg' + (isHost ? ' host' : '');
  div.innerHTML = `
    ${avatar ? `<img src="${avatar}" alt="">` : ''}
    <div><span class="name${isHost?' host':''}">${escapeHtml(name)}:</span>${escapeHtml(text)}${liked ? '<span class="heart">❤️</span>' : ''}</div>
  `;
  chatEl.appendChild(div);

  // Автоудаление через 7 секунд с плавным исчезновением
  setTimeout(() => {
    if (div.parentNode) {
      div.classList.add('fade-out');
      setTimeout(() => { if (div.parentNode) div.remove(); }, 500);
    }
  }, 7000);

  state.msgInLastMinute.push(Date.now());
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function tickChat() {
  if (state.viewers < 1) return;

  // Активные пользователи: минимум 5
  const activeUsers = Math.min(CONFIG.USER_COUNT, Math.max(5, Math.floor(state.viewers / 30) + 1));
  // Частота сообщений: не менее 30 в минуту при любых зрителях > 0
  const baseMsgPerMin = Math.min(250, Math.max(30, state.viewers * 0.6));
  const effectivePerMin = baseMsgPerMin * state.freqMultiplier;
  const adjustedPerTick = effectivePerMin / 60;

  let toSend = Math.floor(adjustedPerTick) + (Math.random() < (adjustedPerTick % 1) ? 1 : 0);
  for (let i = 0; i < toSend; i++) {
    const candidates = users.slice(0, activeUsers);
    const u = candidates[Math.floor(Math.random() * candidates.length)];
    if (!u) continue;
    if (Date.now() - u.lastMessageTime < CONFIG.MIN_USER_INTERVAL) continue;
    u.lastMessageTime = Date.now();
    const text = pickRandomComment();
    const liked = Math.random() < CONFIG.LIKE_PROBABILITY;
    addMessage({name: u.name, avatar: u.avatar, text, liked});
    if (liked) spawnHeart();
  }
}

/* ============================================================
   СЕРДЕЧКИ (чётко из правого нижнего угла)
============================================================ */
const heartsEl = document.getElementById('hearts');
const heartIcons = ['❤️','💖','💕','💗','💘','💝','💓','❤️‍🔥','💞'];

function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart-fly';
  h.textContent = heartIcons[Math.floor(Math.random()*heartIcons.length)];
  // Случайное смещение влево от правого края (0-80px), чтобы не накладывались идеально
  const offsetX = Math.floor(Math.random() * 80);
  h.style.right = (20 + offsetX) + 'px';
  h.style.setProperty('--x', -(30 + Math.random() * 60) + 'px'); // сдвиг влево при полёте
  h.style.color = `hsl(${Math.random()*30+330}, 85%, 65%)`;
  heartsEl.appendChild(h);
  setTimeout(() => h.remove(), 3500);
}

function tickLikes() {
  if (state.viewers < 1) return;
  // Лайки начинаются с первого зрителя
  const n = Math.max(1, Math.floor(state.viewers / 5));
  state.likesInLastSec = n;
  for (let i = 0; i < Math.min(n, 30); i++) {
    setTimeout(spawnHeart, Math.random() * 1000);
  }
}

/* ============================================================
   КОМАНДЫ
============================================================ */
function handleCommand(text) {
  const trimmed = text.trim();
  if (trimmed === '1') {
    smoothMultiplier('growth', state.growthMultiplier, 2.0, 4000);
    smoothMultiplier('freq',   state.freqMultiplier,   2.5, 4000);
    showToast('⚡ 活跃度上升中...');
    return true;
  }
  if (trimmed === '2') {
    smoothMultiplier('growth', state.growthMultiplier, 0.4, 6000);
    smoothMultiplier('freq',   state.freqMultiplier,   0.5, 6000);
    showToast('🌙 平稳下降中...');
    return true;
  }
  return false;
}

function smoothMultiplier(field, from, to, duration) {
  const start = performance.now();
  const key = field === 'growth' ? 'growthMultiplier' : 'freqMultiplier';
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
    state[key] = from + (to - from) * eased;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ============================================================
   ВВОД ХОСТА
============================================================ */
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

function sendHostMessage() {
  const text = input.value.trim();
  if (!text) return;
  if (handleCommand(text)) {
    input.value = '';
    return;
  }
  addMessage({name: '我 (主播)', avatar: 'https://i.pravatar.cc/40?u=streamer', text, isHost: true});
  input.value = '';
}
sendBtn.onclick = sendHostMessage;
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendHostMessage(); });

/* Остальные кнопки */
document.getElementById('likeBtn').onclick = () => {
  for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 80);
};
document.getElementById('shareBtn').onclick = () => showToast('📤 已复制分享链接');
document.getElementById('followBtn').onclick = (e) => {
  const btn = e.currentTarget;
  if (btn.textContent.includes('+')) {
    btn.textContent = '已关注';
    btn.style.background = 'rgba(255,255,255,0.2)';
    showToast('💖 关注成功');
  } else {
    btn.textContent = '+ 关注';
    btn.style.background = '#ff2c55';
  }
};

document.getElementById('fsBtn').onclick = () => {

    document.documentElement.requestFullscreen?.().catch(() => {});

};

/* Toast */
function showToast(text) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  document.getElementById('app').appendChild(t);
  setTimeout(() => t.remove(), 2000);
}
